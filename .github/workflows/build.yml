name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Install dependencies
      working-directory: ./android
      run: flutter pub get
    
    - name: Analyze code
      working-directory: ./android
      run: flutter analyze || true
    
    - name: Build APK
      working-directory: ./android
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: piples-sprite-tool-apk
        path: android/build/app/outputs/flutter-apk/app-release.apk
    
    - name: Rename APK
      run: |
        mkdir -p output
        cp android/build/app/outputs/flutter-apk/app-release.apk output/piples-sprite-tool.apk
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: output/piples-sprite-tool.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
